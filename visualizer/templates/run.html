<!DOCTYPE html>
<html>
<head>
    <title>{{ filename }} • Prometheus</title>
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            background: #0f0f12;
            color: #e0e0e0;
            line-height: 1.7;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #7aa2f7;
            text-decoration: none;
            margin-bottom: 24px;
            font-size: 15px;
        }
        .back:hover { text-decoration: underline; }
        h1 {
            color: #fff;
            margin: 0 0 8px 0;
            font-size: 28px;
        }
        .filename {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .section {
            background: #1a1a1f;
            border: 1px solid #2a2a32;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .section h2 {
            margin: 0 0 16px 0;
            color: #fff;
            font-size: 18px;
        }
        pre {
            background: #111;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #333;
            margin: 0;
        }
        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 14px;
        }
        .full-report {
            white-space: pre-wrap;
            font-size: 13px;
            background: #111;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Back to Dashboard</a>

        <h1>Run Report</h1>
        <div class="filename">{{ filename }}</div>

        {% if code_block %}
        <div class="section">
            <h2>Generated Code</h2>
            <pre><code class="language-python">{{ code_block }}</code></pre>
        </div>
        {% endif %}

        <div class="section">
            <h2>Full Report</h2>
            <pre class="full-report">{{ content }}</pre>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
</body>
</html>
