<!DOCTYPE html>
<html>
<head>
    <title>Running • Prometheus</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f0f12;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 520px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #2a2a32;
            border-top-color: #7aa2f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 { margin: 0 0 12px 0; color: #fff; }
        .goal {
            background: #1a1a1f;
            padding: 16px 20px;
            border-radius: 8px;
            color: #aaa;
            font-size: 14px;
            margin: 20px 0;
        }
        .note {
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Running Prometheus Agent...</h1>
        <p style="color:#888;">Please wait while the agent re-executes the goal.</p>
        
        <div class="goal">
            <strong>Goal:</strong><br>
            {{ goal }}
        </div>
        
        <p class="note">This usually takes 30–90 seconds depending on the task.</p>
    </div>
</body>
</html>
